name: Release build

# Baut die Release-Artefakte nachvollziehbar aus dem Quellcode, reicht sie
# optional bei SignPath zum Signieren ein und veroeffentlicht bei einem
# Tag-Push das GitHub-Release mit den CI-Artefakten. Der Signierschritt
# laeuft erst, wenn die SignPath-Zugangsdaten als Repository-Variablen und
# -Secret hinterlegt sind (siehe docs/signpath-application.md). Ist die
# Signierung konfiguriert, wird ausschliesslich das signierte Ergebnis
# veroeffentlicht; schlaegt sie fehl, entsteht kein Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Volle Historie inkl. Tags, damit build.ps1 die Version aus
          # "git describe" ableiten kann, wenn kein Tag-Push vorliegt.
          fetch-depth: 0

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build artifacts
        shell: powershell
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            .\build.ps1 -Version $env:GITHUB_REF_NAME -RequireInstaller
          } else {
            .\build.ps1 -RequireInstaller
          }

      - name: Upload unsigned artifacts
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: dist-unsigned
          path: dist/
          if-no-files-found: error

  sign:
    needs: build
    # Laeuft nur, wenn die SignPath-Integration konfiguriert ist.
    if: vars.SIGNPATH_ORGANIZATION_ID != ''
    runs-on: ubuntu-latest
    steps:
      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          output-artifact-directory: signed

      - name: Regenerate checksums for signed artifacts
        # Durch die Signatur aendern sich die Datei-Hashes; SHA256SUMS.txt
        # muss deshalb fuer die signierten Artefakte neu erzeugt werden.
        run: |
          cd signed
          rm -f SHA256SUMS.txt
          sha256sum * > SHA256SUMS.txt

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-signed
          path: signed/
          if-no-files-found: error

  release:
    needs: [build, sign]
    # Veroeffentlicht ausschliesslich bei einem Tag-Push; ein manuell per
    # workflow_dispatch gestarteter Lauf baut nur. Wurde der Signierjob
    # uebersprungen (SignPath noch nicht konfiguriert), werden die
    # unsignierten CI-Artefakte veroeffentlicht; ist er fehlgeschlagen,
    # wird kein Release erstellt.
    if: >-
      !cancelled() &&
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      needs.build.result == 'success' &&
      (needs.sign.result == 'success' || needs.sign.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed artifacts
        if: needs.sign.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: dist-signed
          path: release-assets

      - name: Download unsigned artifacts
        if: needs.sign.result == 'skipped'
        uses: actions/download-artifact@v7
        with:
          name: dist-unsigned
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" release-assets/* \
              --verify-tag \
              --title "M24 Backup $version" \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY"
          fi
